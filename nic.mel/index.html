<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Planejador Ultra - Colunas</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com" rel="stylesheet">

    <style>
    
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
            margin: 0;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 850px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        h1 {
            font-family: 'Ultra', serif;
            color: #2d3436;
            text-align: center;
            font-size: 35px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .conteudo-principal {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

    
        .coluna-input {
            flex: 1; 
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: sticky; 
            top: 20px;
        }

        
        .coluna-lista {
            flex: 1.5; /* Ocupa 60% do espaço aprox. */
            border-left: 2px solid #f1f2f6;
            padding-left: 30px;
            min-height: 200px;
        }

        input {
            padding: 12px;
            border: 2px solid #dfe6e9;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
            font-size: 15px;
        }

        input:focus {
            border-color: #f3c6ff;
        }

        button#add-btn {
            background-color: #f3c6ff;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        button#add-btn:hover {
            background-color: #3a0350;
        }

        
        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .task-item {
            background: #fff;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            padding: 12px 0;
            justify-content: space-between;
        }

        .task-info {
            flex-grow: 1;
            margin-left: 15px;
        }

        .task-info span {
            display: block;
            font-weight: 500;
            color: #2d3436;
        }

        .task-info small {
            color: #636e72;
            font-size: 12px;
        }

        .completed span, .completed small {
            text-decoration: line-through;
            opacity: 0.5;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff7675;
            cursor: pointer;
            font-size: 20px;
            padding: 5px;
        }
        @media (max-width: 650px) {
            .conteudo-principal {
                flex-direction: column;
            }
            .coluna-lista {
                border-left: none;
                padding-left: 0;
                width: 100%;
            }
            .container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Planner Semanal</h1>

        <div class="conteudo-principal">

            <div class="coluna-input">
                <input type="text" id="campo-texto" placeholder="O que precisa ser feito?">
                <input type="date" id="campo-data">
                <button id="add-btn">ADICIONAR</button>
            </div>

            <div class="coluna-lista">
                <ul id="lista-tarefas" class="task-list">
    
                </ul>
            </div>
        </div>
    </div>

    <script>
    

        const btnAdicionar = document.getElementById('add-btn');
        const inputTexto = document.getElementById('campo-texto');
        const inputData = document.getElementById('campo-data');
        const listaUl = document.getElementById('lista-tarefas');

        function adicionarTarefa() {
            const texto = inputTexto.value;
            const dataOriginal = inputData.value;

            if (texto.trim() === "") {
                alert("Escreva uma tarefa primeiro!");
                return;
            }

            const li = document.createElement('li');
            li.className = 'task-item';

        
            let dataFormatada = "Sem data";
            if (dataOriginal) {
                const partes = dataOriginal.split('-');
                dataFormatada = `${partes[2]}/${partes[1]}/${partes[0]}`; 
            }

            li.innerHTML = `
                <input type="checkbox" onclick="marcarFeito(this)">
                <div class="task-info">
                    <span>${texto}</span>
                    <small>Prazo: ${dataFormatada}</small>
                </div>
                <button class="delete-btn" onclick="removerTarefa(this)">🗑️</button>
            `;

            listaUl.appendChild(li);

            inputTexto.value = "";
            inputData.value = "";
        }

        function removerTarefa(botao) {
            botao.parentElement.remove();
        }

        function marcarFeito(checkbox) {
            const info = checkbox.nextElementSibling;
            info.classList.toggle('completed');
        }

        btnAdicionar.addEventListener('click', adicionarTarefa);

        inputTexto.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') adicionarTarefa();
        });
    </script>

</body>
</html>
